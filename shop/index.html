<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimoIT — Shop fornitori</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
<style>
  :root{
    --navy:#0F1F3A; --navy-dark:#0A1428; --navy-card:#162038;
    --off-white:#F8F9FB; --lime:#D4FF3A; --lime-hover:#C2F020;
    --text-dark:#0A0E1A; --muted:#5B6678; --line:#E6E9EF;
    --green:#1E9E5A; --amber:#D98A1F; --teal:#0E9488; --blue:#2563EB;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{font-family:'Inter',system-ui,sans-serif;}
  body{background:var(--off-white);color:var(--text-dark);}
  a{text-decoration:none;color:inherit;}
  button{font-family:inherit;cursor:pointer;}

  /* ── HEADER ── */
  header{
    position:sticky;top:0;z-index:50;background:var(--navy);
    border-bottom:1px solid rgba(255,255,255,.08);
    display:flex;align-items:center;gap:20px;padding:0 24px;height:64px;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand img{height:34px;width:auto;display:block;}
  .brand .tag{color:#fff;font-weight:700;font-size:.95rem;letter-spacing:.02em;}
  .brand .tag span{color:var(--lime);}
  .search{flex:1;max-width:520px;position:relative;}
  .search i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#7E8BA3;font-size:.9rem;}
  .search input{
    width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
    border-radius:10px;padding:10px 14px 10px 38px;color:#fff;font-size:.9rem;outline:none;
  }
  .search input::placeholder{color:rgba(255,255,255,.4);}
  .search input:focus{border-color:var(--lime);}
  .cart-btn{
    position:relative;background:var(--lime);color:var(--navy-dark);border:none;
    border-radius:10px;padding:10px 16px;font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:8px;
  }
  .cart-btn:hover{background:var(--lime-hover);}
  .cart-count{
    background:var(--navy-dark);color:var(--lime);border-radius:100px;font-size:.72rem;
    min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;font-weight:800;
  }
  .filters-toggle{display:none;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15);
    border-radius:10px;padding:10px 14px;font-weight:600;font-size:.85rem;}

  /* ── LAYOUT ── */
  .layout{display:flex;align-items:flex-start;}
  aside{
    width:248px;flex-shrink:0;background:#fff;border-right:1px solid var(--line);
    position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;padding:20px 18px;
  }
  .fgroup{border-bottom:1px solid var(--line);padding:14px 0;}
  .fgroup:first-child{padding-top:0;}
  .fgroup h4{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;font-weight:700;}
  .fopt{display:flex;align-items:center;gap:9px;padding:4px 0;font-size:.86rem;color:#2B3344;cursor:pointer;}
  .fopt input{accent-color:var(--navy);width:15px;height:15px;cursor:pointer;}
  .fopt .cnt{margin-left:auto;color:#9AA4B5;font-size:.76rem;}
  .price-row{display:flex;gap:8px;align-items:center;}
  .price-row input{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;font-size:.84rem;outline:none;}
  .price-row input:focus{border-color:var(--navy);}
  .reset{margin-top:14px;width:100%;background:#fff;border:1px solid var(--line);border-radius:8px;padding:9px;font-size:.82rem;color:var(--muted);font-weight:600;}
  .reset:hover{border-color:var(--navy);color:var(--navy);}

  main{flex:1;min-width:0;padding:20px 24px 60px;}
  .topbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
  .count{font-size:.9rem;color:var(--muted);}
  .count b{color:var(--text-dark);}
  .topbar .spacer{flex:1;}
  .topbar select{border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:.84rem;background:#fff;outline:none;color:var(--text-dark);}
  .viewtoggle{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .viewtoggle button{background:#fff;border:none;padding:8px 12px;color:var(--muted);font-size:.9rem;}
  .viewtoggle button.active{background:var(--navy);color:#fff;}

  /* ── BADGES ── */
  .badge{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:100px;letter-spacing:.02em;}
  .grade-Aplus{background:rgba(30,158,90,.14);color:var(--green);}
  .grade-A{background:rgba(14,148,136,.14);color:var(--teal);}
  .grade-Aminus{background:rgba(37,99,235,.12);color:var(--blue);}
  .grade-B{background:rgba(217,138,31,.14);color:var(--amber);}
  .grade-C{background:rgba(192,105,122,.18);color:#B0485E;}
  .grade-none{background:#EEF1F6;color:#5B6678;}
  .badge.cond{background:#EEF1F6;color:#5B6678;}
  .badge.sup{background:var(--navy);color:#fff;}

  /* ── GRID VIEW ── */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:16px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;position:relative;transition:box-shadow .15s,border-color .15s;}
  .card:hover{box-shadow:0 8px 24px rgba(15,31,58,.08);border-color:#D2D8E2;}
  .card.selected{border-color:var(--navy);box-shadow:0 0 0 1px var(--navy);}
  .card-img{height:120px;background:linear-gradient(135deg,#F2F5FA,#E9EEF6);display:flex;align-items:center;justify-content:center;color:#AEB9CC;font-size:2.4rem;position:relative;}
  .card-check{position:absolute;top:10px;left:10px;z-index:2;}
  .card-check input{width:18px;height:18px;accent-color:var(--navy);cursor:pointer;}
  .card-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px;flex:1;}
  .card-badges{display:flex;gap:6px;flex-wrap:wrap;}
  .card-title{font-size:.9rem;font-weight:700;line-height:1.3;}
  .card-specs{font-size:.78rem;color:#42506A;line-height:1.5;}
  .card-gpu{font-size:.75rem;color:#5B6678;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .card-gpu i{font-size:.72rem;color:#AEB9CC;}
  .card-gpu.ded{color:var(--navy);font-weight:600;}
  .card-gpu.ded i{color:var(--green);}
  .card-gpu .gpu-tag{background:rgba(30,158,90,.14);color:var(--green);font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:100px;}
  .card-meta{font-size:.74rem;color:#9AA4B5;}
  .card-foot{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:6px;}
  .price{font-size:1.05rem;font-weight:800;color:var(--navy);white-space:nowrap;}
  .price small{font-size:.7rem;color:var(--muted);font-weight:600;}
  .price.req{font-size:.82rem;color:var(--amber);}
  .add{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:.78rem;font-weight:700;white-space:nowrap;}
  .add:hover{background:var(--navy-dark);}
  .add.in{background:var(--lime);color:var(--navy-dark);}

  /* ── LIST VIEW ── */
  .list{display:flex;flex-direction:column;gap:10px;}
  .row{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:16px;transition:box-shadow .15s,border-color .15s;}
  .row:hover{box-shadow:0 6px 18px rgba(15,31,58,.07);}
  .row.selected{border-color:var(--navy);box-shadow:0 0 0 1px var(--navy);}
  .row>input{width:18px;height:18px;accent-color:var(--navy);flex-shrink:0;cursor:pointer;}
  .row-main{width:230px;flex-shrink:0;}
  .row-title{font-size:.9rem;font-weight:700;line-height:1.3;margin-bottom:5px;}
  .row-sub{display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:.72rem;color:#9AA4B5;}
  .row-attrs{flex:1;display:grid;grid-template-columns:1.15fr .62fr .95fr 1.5fr .6fr .55fr;gap:10px;min-width:0;}
  .row-attrs .a span{display:block;font-size:.64rem;text-transform:uppercase;letter-spacing:.05em;color:#A6AFBF;margin-bottom:2px;}
  .row-attrs .a div{font-size:.8rem;color:#2B3344;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row-price{width:150px;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}

  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty i{font-size:2rem;margin-bottom:12px;color:#C4CCD8;}

  /* ── CART PANEL ── */
  .overlay{position:fixed;inset:0;background:rgba(10,20,40,.5);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60;}
  .overlay.open{opacity:1;pointer-events:auto;}
  .cart{position:fixed;top:0;right:0;height:100%;width:400px;max-width:92vw;background:#fff;z-index:70;
    transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column;box-shadow:-10px 0 40px rgba(0,0,0,.2);}
  .cart.open{transform:translateX(0);}
  .cart-head{background:var(--navy);color:#fff;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
  .cart-head h3{font-size:1rem;font-weight:700;}
  .cart-head button{background:none;border:none;color:#fff;font-size:1.2rem;}
  .cart-items{flex:1;overflow-y:auto;padding:12px 16px;}
  .citem{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
  .citem-body{flex:1;min-width:0;}
  .citem-title{font-size:.84rem;font-weight:700;line-height:1.3;margin-bottom:3px;}
  .citem-sku{font-size:.7rem;color:#9AA4B5;margin-bottom:6px;}
  .qty{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:7px;overflow:hidden;}
  .qty button{background:#F4F6FA;border:none;width:26px;height:26px;font-size:.95rem;color:var(--navy);}
  .qty span{min-width:30px;text-align:center;font-size:.82rem;font-weight:700;}
  .citem-right{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .citem-price{font-size:.86rem;font-weight:800;color:var(--navy);}
  .citem-del{background:none;border:none;color:#C0697A;font-size:.74rem;}
  .cart-foot{border-top:1px solid var(--line);padding:16px 20px;}
  .cart-total{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
  .cart-total b{font-size:1.3rem;color:var(--navy);}
  .cart-note{font-size:.72rem;color:var(--muted);margin-bottom:12px;}
  .cart-input{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:.85rem;margin-bottom:8px;outline:none;font-family:inherit;}
  .cart-input:focus{border-color:var(--navy);}
  .cart-send{width:100%;background:var(--lime);color:var(--navy-dark);border:none;border-radius:10px;padding:14px;font-weight:800;font-size:.95rem;display:flex;align-items:center;justify-content:center;gap:8px;}
  .cart-send:hover{background:var(--lime-hover);}
  .cart-empty{text-align:center;color:var(--muted);padding:50px 20px;}
  .citem-svc{font-size:.72rem;color:#5B6678;margin:4px 0 6px;line-height:1.5;}

  /* ── CONFIGURATORE ── */
  .cfg-back{position:fixed;inset:0;background:rgba(10,20,40,.55);z-index:80;display:none;align-items:center;justify-content:center;padding:20px;}
  .cfg-back.open{display:flex;}
  .cfg-box{background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:86vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.35);}
  .cfg-head{background:var(--navy);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .cfg-head .t{font-size:.92rem;font-weight:700;line-height:1.3;}
  .cfg-head .s{font-size:.72rem;color:rgba(255,255,255,.6);margin-top:3px;}
  .cfg-head button{background:none;border:none;color:#fff;font-size:1.2rem;flex-shrink:0;cursor:pointer;}
  .cfg-body{padding:4px 20px 10px;overflow-y:auto;}
  .cfg-grp{padding:12px 0;border-bottom:1px solid var(--line);}
  .cfg-grp:last-child{border-bottom:none;}
  .cfg-grp h5{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;font-weight:700;}
  .cfg-opt{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:.85rem;cursor:pointer;}
  .cfg-opt input{accent-color:var(--navy);width:16px;height:16px;flex-shrink:0;}
  .cfg-opt .lab{flex:1;}
  .cfg-opt .pr{font-weight:700;color:var(--navy);font-size:.8rem;white-space:nowrap;}
  .cfg-opt .pr.free{color:var(--green);font-weight:600;}
  .cfg-foot{border-top:1px solid var(--line);padding:14px 20px;display:flex;flex-direction:column;gap:10px;}
  .cfg-total{display:flex;justify-content:space-between;align-items:baseline;}
  .cfg-total b{font-size:1.25rem;color:var(--navy);}
  .cfg-add{background:var(--lime);color:var(--navy-dark);border:none;border-radius:10px;padding:13px;font-weight:800;font-size:.92rem;display:flex;align-items:center;justify-content:center;gap:8px;}
  .cfg-add:hover{background:var(--lime-hover);}
  .cfg-sel{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:.85rem;font-family:inherit;background:#fff;color:var(--text-dark);outline:none;cursor:pointer;}
  .cfg-sel:focus{border-color:var(--navy);}
  .cfg-info{margin-left:6px;color:#9AA4B5;cursor:help;position:relative;font-size:.72rem;text-transform:none;}
  .cfg-info:hover{color:var(--navy);}
  .cfg-info .tip{display:none;position:absolute;top:16px;left:-8px;width:232px;background:var(--navy-dark);color:#fff;font-size:.72rem;font-weight:400;line-height:1.45;padding:9px 11px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:6;letter-spacing:normal;}
  .cfg-info:hover .tip{display:block;}
  .cfg-stock{font-size:.78rem;color:var(--green);font-weight:600;display:flex;align-items:center;gap:6px;}
  .cfg-stock b{color:var(--text-dark);}
  .cfg-actions{display:flex;gap:10px;align-items:stretch;}
  .cfg-qty{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:10px;overflow:hidden;flex-shrink:0;}
  .cfg-qty button{background:#F4F6FA;border:none;width:38px;font-size:1.1rem;color:var(--navy);cursor:pointer;}
  .cfg-qty button:disabled{opacity:.4;cursor:not-allowed;}
  .cfg-qty span{min-width:36px;text-align:center;font-size:.95rem;font-weight:700;}
  .cfg-actions .cfg-add{flex:1;}

  /* ── Bottone occhio + modale Icecat ── */
  .foot-btns{display:flex;align-items:center;gap:8px;}
  .eye-btn{background:#fff;border:1px solid var(--line);border-radius:9px;width:38px;height:38px;flex-shrink:0;color:var(--navy);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:.9rem;transition:.15s;}
  .eye-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
  .row-price .eye-btn{height:36px;}
  .ice-back{position:fixed;inset:0;background:rgba(10,20,40,.55);z-index:90;display:none;align-items:center;justify-content:center;padding:20px;}
  .ice-back.open{display:flex;}
  .ice-box{background:#fff;border-radius:16px;width:100%;max-width:880px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.35);}
  .ice-head{background:var(--navy);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .ice-head .t{font-size:.92rem;font-weight:700;line-height:1.3;}
  .ice-head .s{font-size:.72rem;color:rgba(255,255,255,.6);margin-top:3px;}
  .ice-head button{background:none;border:none;color:#fff;font-size:1.2rem;flex-shrink:0;cursor:pointer;}
  .ice-body{padding:16px 20px;overflow-y:auto;}
  .ice-state{padding:30px 10px;text-align:center;color:var(--muted);font-size:.88rem;}
  .ice-state i{font-size:1.8rem;display:block;margin-bottom:10px;color:#C4CCD8;}
  .ice-ovr{border-top:1px solid var(--line);padding:12px 20px;background:#F8F9FB;font-size:.8rem;}
  .ice-ovr .row1{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .ice-ovr label{font-weight:700;color:var(--navy);}
  .ice-ovr input{flex:1;min-width:160px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:.82rem;outline:none;}
  .ice-ovr button{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-weight:700;font-size:.8rem;cursor:pointer;}
  .ice-ovr button.ghost{background:#fff;color:var(--navy);border:1px solid var(--line);}
  .ice-ovr .hint{color:var(--muted);margin-top:6px;font-size:.74rem;}
  .ice-attr{font-size:.72rem;color:#9AA4B5;text-align:center;padding:8px;border-top:1px solid var(--line);}
  .ice-attr a{color:#5B6678;}

  /* ── RESPONSIVE ── */
  @media(max-width:1100px){.row-attrs{grid-template-columns:repeat(3,1fr);}}
  @media(max-width:900px){
    .filters-toggle{display:block;}
    .search{order:3;flex-basis:100%;max-width:none;}
    header{flex-wrap:wrap;height:auto;padding:12px 16px;gap:12px;}
    aside{position:fixed;top:0;left:0;height:100%;z-index:65;transform:translateX(-100%);transition:transform .25s;box-shadow:10px 0 40px rgba(0,0,0,.2);}
    aside.open{transform:translateX(0);}
    main{padding:16px;}
    .row{flex-wrap:wrap;}
    .row-main{width:100%;}
    .row-attrs{grid-template-columns:repeat(2,1fr);width:100%;}
    .row-price{width:100%;flex-direction:row;justify-content:space-between;align-items:center;}
  }
</style>
</head>
<body>

<header>
  <a class="brand" href="../landing/index.html">
    <img src="../landing/images/logo.png" alt="PrimoIT" onerror="this.style.display='none'">
    <span class="tag"><span>Primo</span>IT · Shop</span>
  </a>
  <button class="filters-toggle" onclick="toggleSidebar()"><i class="fas fa-sliders-h"></i> Filtri</button>
  <div class="search">
    <i class="fas fa-search"></i>
    <input id="search" type="text" placeholder="Cerca per modello, CPU, brand, SKU…" oninput="onSearch(this.value)">
  </div>
  <button class="cart-btn" onclick="openCart()">
    <i class="fas fa-cart-shopping"></i> Carrello
    <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<div class="layout">
  <aside id="sidebar"></aside>
  <main>
    <div class="topbar">
      <div class="count"><b id="resCount">0</b> prodotti</div>
      <div class="spacer"></div>
      <select id="sort" onchange="setSort(this.value)">
        <option value="default">Categoria (predefinito)</option>
        <option value="price-asc">Prezzo crescente</option>
        <option value="price-desc">Prezzo decrescente</option>
        <option value="name">Nome A-Z</option>
        <option value="stock">Disponibilità</option>
      </select>
      <div class="viewtoggle">
        <button id="vGrid" onclick="setView('grid')" title="Griglia"><i class="fas fa-th-large"></i></button>
        <button id="vList" onclick="setView('list')" title="Lista"><i class="fas fa-list"></i></button>
      </div>
    </div>
    <div id="products"></div>
  </main>
</div>

<div class="overlay" id="overlay" onclick="closeCart();closeSidebar()"></div>
<div class="cart" id="cartPanel">
  <div class="cart-head">
    <h3><i class="fas fa-cart-shopping"></i> La tua richiesta</h3>
    <button onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-foot">
    <div class="cart-total"><span>Totale indicativo</span><b id="cartTotal">€0</b></div>
    <div class="cart-note">Prezzi rivenditore IVA esclusa · articoli "su richiesta" esclusi dal totale.</div>
    <input id="custName" class="cart-input" type="text" placeholder="Nome / azienda (opzionale)">
    <input id="custContact" class="cart-input" type="text" placeholder="Telefono o email (opzionale)">
    <button class="cart-send" onclick="sendRequest()"><i class="fab fa-whatsapp"></i> Invia richiesta su WhatsApp</button>
  </div>
</div>

<div class="cfg-back" id="cfgBack" onclick="if(event.target===this)closeConfig()"><div class="cfg-box" id="cfgBox"></div></div>
<div class="ice-back" id="iceBack" onclick="if(event.target===this)closeIcecat()"><div class="ice-box" id="iceBox"></div></div>

<script src="catalog.js"></script>
<script src="icecat_map.js?v=fix-partcode"></script>
<script>
  var WHATSAPP = '393274894895';
  // In locale (file:// o localhost) usa il backend su :8000; in produzione usa la stessa origine (/api proxato da nginx)
  var API_BASE = (location.protocol==='file:'||location.hostname==='localhost'||location.hostname==='127.0.0.1') ? 'http://localhost:8000' : '';
  var CAT_ICON = {'Laptop':'fa-laptop','Computer':'fa-desktop','Monitor':'fa-display','Tablet & Smartphone':'fa-mobile-screen','Accessori':'fa-plug'};
  var CAT_ORDER = ['Laptop','Computer','Monitor','Tablet & Smartphone','Accessori'];
  function catRank(c){ var i=CAT_ORDER.indexOf(c); return i<0?99:i; }
  var GRADE_CLASS = {'A+':'grade-Aplus','A':'grade-A','A-':'grade-Aminus','B':'grade-B','C':'grade-C','—':'grade-none'};

  var state = {
    suppliers:new Set(), categories:new Set(), conditions:new Set(),
    grades:new Set(), gpuTypes:new Set(), brands:new Set(), priceMin:null, priceMax:null,
    search:'', sort:'default', view:'grid'
  };
  var cart = {}; // id -> qty
  var ALL = window.CATALOG || [];
  var META = window.CATALOG_META || {};

  function eur(n){ return '€' + n.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* ── SIDEBAR ── */
  function countBy(field, val){ return ALL.filter(function(p){return p[field]===val;}).length; }
  function buildSidebar(){
    var s = META.suppliers.map(function(x){return checkRow('suppliers',x.id,x.name,countBy('supplier',x.id));}).join('');
    var html = ''
      + group('Fornitore', s)
      + group('Categoria', META.categories.map(function(c){return checkRow('categories',c,c,countBy('category',c));}).join(''))
      + group('Condizione', META.conditions.map(function(c){return checkRow('conditions',c,c,countBy('condition',c));}).join(''))
      + group('Grado', META.grades.map(function(g){return checkRow('grades',g,g==='—'?'Open Box':'Grado '+g,countBy('grade',g));}).join(''))
      + group('Scheda video', (META.gpuTypes||[]).map(function(g){return checkRow('gpuTypes',g,g==='Dedicata'?'GPU dedicata':'Integrata',countBy('gpu_type',g));}).join(''))
      + group('Prezzo (€)',
          '<div class="price-row"><input type="number" id="pmin" placeholder="min" oninput="setPrice()"> <span>–</span> '
          + '<input type="number" id="pmax" placeholder="max" oninput="setPrice()"></div>')
      + group('Brand', META.brands.map(function(b){return checkRow('brands',b,b,countBy('brand',b));}).join(''))
      + '<button class="reset" onclick="resetFilters()">Azzera filtri</button>';
    document.getElementById('sidebar').innerHTML = html;
  }
  function group(title, body){ return '<div class="fgroup"><h4>'+title+'</h4>'+body+'</div>'; }
  function checkRow(set, val, label, cnt){
    return '<label class="fopt"><input type="checkbox" onchange="toggleFilter(\''+set+'\',\''+esc(val)+'\',this.checked)">'
      + '<span>'+esc(label)+'</span><span class="cnt">'+cnt+'</span></label>';
  }
  function toggleFilter(set,val,on){ on?state[set].add(val):state[set].delete(val); render(); }
  function setPrice(){
    var mn=parseFloat(document.getElementById('pmin').value), mx=parseFloat(document.getElementById('pmax').value);
    state.priceMin=isNaN(mn)?null:mn; state.priceMax=isNaN(mx)?null:mx; render();
  }
  function resetFilters(){
    ['suppliers','categories','conditions','grades','gpuTypes','brands'].forEach(function(k){state[k].clear();});
    state.priceMin=state.priceMax=null; state.search='';
    document.getElementById('search').value='';
    buildSidebar(); render();
  }

  /* ── FILTER + SORT ── */
  function applyFilters(){
    return ALL.filter(function(p){
      if(state.suppliers.size && !state.suppliers.has(p.supplier)) return false;
      if(state.categories.size && !state.categories.has(p.category)) return false;
      if(state.conditions.size && !state.conditions.has(p.condition)) return false;
      if(state.grades.size && !state.grades.has(p.grade)) return false;
      if(state.gpuTypes.size && !state.gpuTypes.has(p.gpu_type)) return false;
      if(state.brands.size && !state.brands.has(p.brand)) return false;
      if(state.priceMin!=null && (p.price==null||p.price<state.priceMin)) return false;
      if(state.priceMax!=null && (p.price==null||p.price>state.priceMax)) return false;
      if(state.search){
        var q=state.search.toLowerCase();
        var hay=(p.title+' '+p.cpu+' '+p.brand+' '+p.id+' '+p.ram+' '+p.drive).toLowerCase();
        if(hay.indexOf(q)<0) return false;
      }
      return true;
    });
  }
  function sortList(list){
    var s=state.sort;
    function pr(x){ return x.price==null?Infinity:x.price; }
    return list.slice().sort(function(a,b){
      if(s==='default'){ var d=catRank(a.category)-catRank(b.category); return d!==0?d:pr(a)-pr(b); }
      if(s==='name') return a.title.localeCompare(b.title);
      if(s==='stock') return b.stock-a.stock;
      if(s==='price-desc') return pr(b)-pr(a);
      return pr(a)-pr(b);
    });
  }

  /* ── RENDER ── */
  function render(){
    var list=sortList(applyFilters());
    document.getElementById('resCount').textContent=list.length;
    var c=document.getElementById('products');
    if(!list.length){ c.innerHTML='<div class="empty"><i class="fas fa-box-open"></i><div>Nessun prodotto con questi filtri.</div></div>'; return; }
    if(state.view==='grid'){
      c.className='grid';
      c.innerHTML=list.map(cardGrid).join('');
    }else{
      c.className='list';
      c.innerHTML=list.map(cardList).join('');
    }
  }
  function priceHtml(p){
    return p.price==null ? '<span class="price req">Su richiesta</span>'
      : '<span class="price">'+eur(p.price)+' <small>+IVA</small></span>';
  }
  function badges(p){
    var cond='<span class="badge cond">'+esc(p.condition)+'</span>';
    if(p.grade==='—') return cond;
    return '<span class="badge '+(GRADE_CLASS[p.grade]||'grade-none')+'">Grado '+p.grade+'</span>'+cond;
  }
  function specLine(p){
    return [p.cpu,p.ram,p.drive].filter(Boolean).map(esc).join(' · ') || '<span style="color:#AEB9CC">Specifiche nel dettaglio</span>';
  }
  function gpuFull(p){ return esc(p.gpu)+(p.gpu_vram?' '+esc(p.gpu_vram):''); }
  function gpuLine(p){
    if(!p.gpu_type) return '';
    if(p.gpu_type==='Dedicata')
      return '<div class="card-gpu ded"><i class="fas fa-bolt"></i> '+gpuFull(p)+' <span class="gpu-tag">dedicata</span></div>';
    return '<div class="card-gpu"><i class="fas fa-microchip"></i> '+gpuFull(p)+'</div>';
  }
  function attrGpu(p){
    if(!p.gpu_type) return attr('GPU','—');
    var name=(p.gpu||'').replace(/^GeForce /,'')+(p.gpu_vram?' '+p.gpu_vram:'');
    var st = p.gpu_type==='Dedicata' ? ' style="color:var(--green);font-weight:700"' : '';
    return '<div class="a"><span>GPU</span><div'+st+' title="'+esc((p.gpu||'')+(p.gpu_vram?' '+p.gpu_vram:''))+' · '+esc(p.gpu_type)+'">'+esc(name)+'</div></div>';
  }
  function attrKb(p){
    return '<div class="a"><span>Tastiera</span><div title="'+esc(p.keyboard||'')+'">'+esc(p.keyboard_short||'—')+'</div></div>';
  }
  function inCart(id){ return cart[id]!=null; }
  function cardGrid(p){
    var sel=inCart(p.id)?' selected':'';
    return '<div class="card'+sel+'">'
      + '<div class="card-img"><span class="card-check"><input type="checkbox" '+(inCart(p.id)?'checked':'')+' onchange="addAction(\''+p.id+'\')"></span><i class="fas '+(CAT_ICON[p.category]||'fa-box')+'"></i></div>'
      + '<div class="card-body">'
      +   '<div class="card-badges">'+badges(p)+'</div>'
      +   '<div class="card-title">'+esc(p.title)+'</div>'
      +   '<div class="card-specs">'+specLine(p)+'</div>'
      +   gpuLine(p)
      +   '<div class="card-meta">'+esc(p.brand)+(p.keyboard_short?' · '+esc(p.keyboard_short):'')+' · '+p.stock+' pz</div>'
      +   '<div class="card-foot">'+priceHtml(p)
      +     '<div class="foot-btns">'
      +       eyeBtn(p)
      +       '<button class="add'+(inCart(p.id)?' in':'')+'" onclick="addAction(\''+p.id+'\')">'+(inCart(p.id)?'✓ Aggiunto':'Aggiungi')+'</button>'
      +     '</div>'
      +   '</div>'
      + '</div></div>';
  }
  function attr(label,val){ return '<div class="a"><span>'+label+'</span><div>'+(val?esc(val):'—')+'</div></div>'; }
  function cardList(p){
    var sel=inCart(p.id)?' selected':'';
    return '<div class="row'+sel+'">'
      + '<input type="checkbox" '+(inCart(p.id)?'checked':'')+' onchange="addAction(\''+p.id+'\')">'
      + '<div class="row-main"><div class="row-title">'+esc(p.title)+'</div>'
      +   '<div class="row-sub">'+badges(p)+' <span>'+esc(p.brand)+'</span> · <span>'+esc(p.id)+'</span></div></div>'
      + '<div class="row-attrs">'+attr('CPU',p.cpu)+attr('RAM',p.ram)+attr('Drive',p.drive)+attrGpu(p)+attrKb(p)+attr('Stock',p.stock+' pz')+'</div>'
      + '<div class="row-price">'+priceHtml(p)
      +   '<div class="foot-btns">'
      +     eyeBtn(p)
      +     '<button class="add'+(inCart(p.id)?' in':'')+'" onclick="addAction(\''+p.id+'\')">'+(inCart(p.id)?'✓ Aggiunto':'Aggiungi')+'</button>'
      +   '</div></div>'
      + '</div>';
  }

  /* ── CART ── (cart[id] = {qty, services:[{label,price}], price:unitaria}) */
  function findP(id){ for(var i=0;i<ALL.length;i++) if(ALL[i].id===id) return ALL[i]; return null; }
  function cartQtyTotal(){ var n=0; for(var k in cart) n+=cart[k].qty; return n; }
  function svcSum(services){ var s=0; services.forEach(function(x){s+=x.price;}); return s; }
  function quickAdd(id){ var p=findP(id); cart[id]={qty:1,services:[],price:(p.price!=null?p.price:null)}; updateCart(); render(); }
  function setQty(id,d){ if(!cart[id])return; var p=findP(id), mx=p.stock>0?p.stock:99; cart[id].qty=Math.min(mx,Math.max(1,cart[id].qty+d)); updateCart(); }
  function removeCart(id){ delete cart[id]; updateCart(); render(); }
  function addAction(id){ if(inCart(id)) removeCart(id); else openConfig(id); }
  function updateCart(){
    document.getElementById('cartCount').textContent=cartQtyTotal();
    var ids=Object.keys(cart), box=document.getElementById('cartItems'), total=0;
    if(!ids.length){ box.innerHTML='<div class="cart-empty"><i class="fas fa-cart-shopping" style="font-size:2rem;color:#D2D8E2;display:block;margin-bottom:12px"></i>Carrello vuoto.<br>Aggiungi prodotti dalla lista.</div>'; }
    else{
      box.innerHTML=ids.map(function(id){
        var p=findP(id), it=cart[id]; var line=it.price!=null?it.price*it.qty:null; if(line!=null) total+=line;
        var svc=it.services.length?'<div class="citem-svc">'+it.services.map(function(s){return '+ '+esc(s.label)+(s.price?' <b>('+eur(s.price)+')</b>':'');}).join('<br>')+'</div>':'';
        return '<div class="citem"><div class="citem-body"><div class="citem-title">'+esc(p.title)+'</div>'
          + '<div class="citem-sku">'+esc(p.id)+' · '+esc(p.brand)+'</div>'+svc
          + '<div class="qty"><button onclick="setQty(\''+id+'\',-1)">−</button><span>'+it.qty+'</span><button onclick="setQty(\''+id+'\',1)">+</button></div></div>'
          + '<div class="citem-right"><div class="citem-price">'+(it.price!=null?eur(it.price*it.qty):'<span style="color:#D98A1F">su richiesta</span>')+'</div>'
          + '<button class="citem-del" onclick="removeCart(\''+id+'\')">Rimuovi</button></div></div>';
      }).join('');
    }
    document.getElementById('cartTotal').textContent=eur(total);
  }
  function openCart(){ document.getElementById('cartPanel').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
  function closeCart(){ document.getElementById('cartPanel').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }
  function sendRequest(){
    var ids=Object.keys(cart);
    if(!ids.length){ alert('Il carrello è vuoto.'); return; }
    var nameEl=document.getElementById('custName'), contactEl=document.getElementById('custContact');
    var name=nameEl&&nameEl.value?nameEl.value.trim():'';
    var contact=contactEl&&contactEl.value?contactEl.value.trim():'';
    var lines=['Ciao PrimoIT! Vorrei un preventivo per questi articoli:'];
    if(name) lines.push('Nome: '+name);
    if(contact) lines.push('Contatto: '+contact);
    lines.push('');
    var total=0, items=[];
    ids.forEach(function(id){ var p=findP(id),it=cart[id];
      lines.push('• '+p.title+' ['+p.id+'] x'+it.qty+(it.price!=null?' — '+eur(it.price*it.qty):' — su richiesta'));
      it.services.forEach(function(s){ lines.push('    ◦ '+s.label+(s.price?' (+'+eur(s.price)+')':'')); });
      if(it.price!=null) total+=it.price*it.qty;
      items.push({sku:p.id, title:p.title, brand:p.brand, qty:it.qty, unit:it.price,
        total:(it.price!=null?it.price*it.qty:null), services:it.services.map(function(s){return s.label;})});
    });
    lines.push(''); lines.push('Totale indicativo (IVA escl.): '+eur(total));
    // salva il deal nel mini-CRM (non bloccante: WhatsApp si apre comunque)
    try{
      fetch(API_BASE+'/api/deals',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({items:items, total:total, customer_name:name, customer_contact:contact})}).catch(function(){});
    }catch(e){}
    window.open('https://wa.me/'+WHATSAPP+'?text='+encodeURIComponent(lines.join('\n')),'_blank');
  }

  /* ── CONFIGURATORE SERVIZI (bozza, prezzi fornitore) ── */
  var SVC_BASE = [
    {key:'os', label:'Sistema operativo',
     desc:'Il prodotto è consegnato senza sistema operativo. Puoi installarlo tu oppure lasciarlo ai nostri tecnici: Windows 11 (Home o Pro) con le applicazioni di base preinstallate.',
     opts:[
      {l:'Lo installo io (nessun OS)', p:0},
      {l:'Windows 11 Home + applicazioni', p:30},
      {l:'Windows 11 Pro + applicazioni', p:50}]},
    {key:'warranty', label:'Garanzia',
     desc:'Estende la copertura oltre la garanzia inclusa. Il costo dipende dal valore del prodotto.',
     opts:[
      {l:'Inclusa (standard)', p:0},
      {l:'Estensione +12 mesi', p:45},
      {l:'Estensione +24 mesi', p:75}]},
    {key:'office', label:'Microsoft Office',
     desc:'Licenza Microsoft Office originale, installata e attivata. Scegli una versione perpetua oppure l\'abbonamento 365.',
     opts:[
      {l:'Nessuno', p:0},
      {l:'Office Home 2024', p:159},
      {l:'Office Home & Business 2024', p:289},
      {l:'Office 365 Personal (1 anno)', p:89},
      {l:'Office 2016 Standard (volume)', p:99},
      {l:'Office 2019 Standard (volume)', p:129},
      {l:'Office 2021 LTSC Standard (volume)', p:219}]},
    {key:'ssd', label:'Upgrade SSD',
     desc:'Sostituiamo il disco attuale con un SSD di capacità superiore prima della spedizione.',
     opts:[
      {l:'Disco attuale', p:0},
      {l:'480 GB SSD', p:49},
      {l:'1 TB SSD', p:85},
      {l:'2 TB SSD', p:160}]},
    {key:'antivirus', label:'Antivirus',
     desc:'Licenza Kaspersky installata: protezione in tempo reale da virus, trojan, spyware e malware.',
     opts:[
      {l:'Nessuno', p:0},
      {l:'Kaspersky 1 anno', p:25},
      {l:'Kaspersky 1 anno · 5 PC', p:39}]},
    {key:'keyboard', label:'Tastiera',
     desc:'Adesivi del layout nella tua lingua applicati sulla tastiera originale (in alternativa, incisione laser dei caratteri).',
     opts:[
      {l:'Layout standard (incluso)', p:0},
      {l:'Adesivi layout nella tua lingua', p:3}]}
  ];
  var SVC_MONITOR = [
    {key:'cable', label:'Cavo incluso',
     desc:'Cavo di collegamento fornito col monitor. VGA e DVI gratuiti; HDMI e DisplayPort a supplemento.',
     opts:[
      {l:'Nessuno', p:0},
      {l:'VGA', p:0},
      {l:'DVI', p:0},
      {l:'HDMI', p:10},
      {l:'DisplayPort', p:10}]}
  ];
  function servicesFor(cat){
    if(cat==='Laptop'||cat==='Computer') return SVC_BASE;
    if(cat==='Monitor') return SVC_MONITOR;
    return null;
  }
  var cfg=null;
  function openConfig(id){
    var p=findP(id), groups=servicesFor(p.category);
    if(!groups){ quickAdd(id); return; }  // categorie senza servizi → aggiunta diretta
    cfg={id:id, groups:groups, sel:{}, qty:(cart[id]?cart[id].qty:1)};
    if(p.stock>0) cfg.qty=Math.min(p.stock, cfg.qty);
    groups.forEach(function(g){ cfg.sel[g.key]=0; });
    renderConfig(); document.getElementById('cfgBack').classList.add('open');
  }
  function selectOpt(key,idx){ cfg.sel[key]=idx; renderConfig(); }
  function cfgQtyChange(d){ var p=findP(cfg.id), mx=p.stock>0?p.stock:99; cfg.qty=Math.min(mx,Math.max(1,cfg.qty+d)); renderConfig(); }
  function cfgTotal(p){ var t=(p.price||0); cfg.groups.forEach(function(g){ t+=g.opts[cfg.sel[g.key]].p; }); return t; }
  function renderConfig(){
    var p=findP(cfg.id);
    function optText(o){ if(o.p>0) return o.l+' (+'+eur(o.p)+')'; return /incl|nessun|installo|attuale|standard/i.test(o.l)?o.l:o.l+' (Gratis)'; }
    var body=cfg.groups.map(function(g){
      var info=g.desc?'<span class="cfg-info"><i class="fas fa-circle-info"></i><span class="tip">'+esc(g.desc)+'</span></span>':'';
      var opts=g.opts.map(function(o,i){ return '<option'+(cfg.sel[g.key]===i?' selected':'')+'>'+esc(optText(o))+'</option>'; }).join('');
      return '<div class="cfg-grp"><h5>'+esc(g.label)+info+'</h5><select class="cfg-sel" onchange="selectOpt(\''+g.key+'\',this.selectedIndex)">'+opts+'</select></div>';
    }).join('');
    document.getElementById('cfgBox').innerHTML=
      '<div class="cfg-head"><div><div class="t">'+esc(p.title)+'</div><div class="s">Base '+(p.price!=null?eur(p.price):'su richiesta')+' · configura e aggiungi</div></div><button onclick="closeConfig()">✕</button></div>'
      +'<div class="cfg-body">'+body+'</div>'
      +'<div class="cfg-foot">'
      +'<div class="cfg-total"><span>Totale <small style="color:var(--muted);font-weight:500">IVA escl.'+(cfg.qty>1&&p.price!=null?' · '+eur(cfgTotal(p))+' cad.':'')+'</small></span><b>'+(p.price!=null?eur(cfgTotal(p)*cfg.qty):'su richiesta')+'</b></div>'
      +'<div class="cfg-stock"><i class="fas fa-circle-check"></i> '+esc(p.availability||'Disponibile')+' · <b>'+p.stock+' pz disponibili</b></div>'
      +'<div class="cfg-actions"><div class="cfg-qty"><button onclick="cfgQtyChange(-1)"'+(cfg.qty<=1?' disabled':'')+'>−</button><span>'+cfg.qty+'</span><button onclick="cfgQtyChange(1)"'+(cfg.qty>=p.stock?' disabled':'')+'>+</button></div>'
      +'<button class="cfg-add" onclick="confirmConfig()"><i class="fas fa-cart-plus"></i> Aggiungi al carrello</button></div>'
      +'</div>';
  }
  function confirmConfig(){
    var p=findP(cfg.id), services=[];
    cfg.groups.forEach(function(g){ if(cfg.sel[g.key]!==0){ var o=g.opts[cfg.sel[g.key]]; services.push({label:g.label+': '+o.l, price:o.p}); }});
    cart[cfg.id]={qty:cfg.qty, services:services, price:(p.price!=null?cfgTotal(p):null)};
    closeConfigSilent(); updateCart(); render(); openCart();
  }
  function closeConfigSilent(){ document.getElementById('cfgBack').classList.remove('open'); cfg=null; }
  function closeConfig(){ closeConfigSilent(); render(); }

  /* ── ICECAT LIVE — dettagli prodotto (widget JS) + matching ── */
  var ICECAT = { shopname:'', lang:'IT', loading:false };
  var ICE_REMOTE_OVERRIDES = {};                    // backend: p.id -> {kind,value,brand}
  var ICE_MAP_KEY = 'primoit_icecat_map';           // fallback locale: p.id -> {gtin|partCode|icecatId|brand}
  var ICE_SHOP_KEY = 'primoit_icecat_shopname';     // fallback per test statico (senza backend)

  function loadIcecatConfig(){
    function fromLS(){ var ls=localStorage.getItem(ICE_SHOP_KEY); if(ls && !ICECAT.shopname) ICECAT.shopname=ls; }
    try{
      fetch(API_BASE+'/api/config').then(function(r){return r.json();}).then(function(c){
        if(c && c.icecatShopname) ICECAT.shopname=c.icecatShopname;
        if(c && c.icecatLang) ICECAT.lang=c.icecatLang;
        fromLS();
      }).catch(fromLS);
      fetch(API_BASE+'/api/icecat-overrides').then(function(r){return r.json();}).then(function(data){
        ICE_REMOTE_OVERRIDES=data.overrides||{};
        render();
      }).catch(function(){});
    }catch(e){ fromLS(); }
  }

  function ensureIcecatJs(cb){
    if(window.IcecatLive){ cb(); return; }
    if(ICECAT.loading){ var t=setInterval(function(){ if(window.IcecatLive){ clearInterval(t); cb(); } },150); return; }
    ICECAT.loading=true;
    var s=document.createElement('script'); s.src='https://live.icecat.biz/js/live-current-2.js';
    s.onload=function(){ // la libreria può finire l'init poco dopo il load
      if(window.IcecatLive) return cb();
      var n=0, t=setInterval(function(){ if(window.IcecatLive||++n>20){ clearInterval(t); cb(window.IcecatLive?null:new Error('init')); } },100);
    };
    s.onerror=function(){ ICECAT.loading=false; cb(new Error('load')); };
    document.head.appendChild(s);
  }

  function iceMap(){ try{ return JSON.parse(localStorage.getItem(ICE_MAP_KEY)||'{}'); }catch(e){ return {}; } }
  function iceSaveMap(m){ localStorage.setItem(ICE_MAP_KEY, JSON.stringify(m)); }

  // estrae un candidato modello/MPN dal titolo nostro
  function extractModel(title, brand){
    var t=' '+(title||'')+' ';
    t=t.replace(/^\s*(Laptop|Notebook|Computer|Desktop|PC|Monitor|Tablet|Smartphone|Telefono)\s+/i,' ');
    t=t.split('/')[0].split('｜')[0].split('|')[0];           // taglia le specifiche
    if(brand) t=t.replace(new RegExp('\\b'+brand.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','ig'),' ');
    t=t.replace(/\d+([.,]\d+)?\s*(″|''|"|inch|pollici)/ig,' ');  // rimuovi misure schermo (24″, 15,6")
    t=t.replace(/\b(FHD|UHD|QHD|HD|4K|2K|WUXGA|IPS|LED|LCD)\b/ig,' ');
    return t.replace(/\s+/g,' ').trim();
  }

  // mappa generata dal matcher per nome (nostro_id -> IcecatProductId)
  function shippedMatch(id){ return (window.ICECAT_MAP||{})[id]; }
  function remoteOverride(id){ return ICE_REMOTE_OVERRIDES[id] || null; }
  function hasIcecat(p){ return !!(remoteOverride(p.id) || shippedMatch(p.id) || iceMap()[p.id]); }

  // sistema di matching → {params, source}
  function icecatQuery(p){
    var ro=remoteOverride(p.id);
    if(ro){
      if(ro.kind==='gtin') return {params:{GTIN:ro.value}, source:'manuale admin · EAN'};
      if(ro.kind==='icecatId') return {params:{IcecatProductId:ro.value}, source:'manuale admin · Icecat ID'};
      if(ro.kind==='partCode') return {params:{Brand:ro.brand||p.brand, ProductCode:ro.value}, source:'manuale admin · codice'};
    }
    var ov=iceMap()[p.id];
    if(ov){
      if(ov.gtin) return {params:{GTIN:ov.gtin}, source:'override locale · EAN'};
      if(ov.icecatId) return {params:{IcecatProductId:ov.icecatId}, source:'override locale · Icecat ID'};
      if(ov.partCode) return {params:{Brand:ov.brand||p.brand, ProductCode:ov.partCode}, source:'override locale · codice'};
    }
    var sm=shippedMatch(p.id);
    if(sm){
      if(sm.partCode) return {params:{Brand:sm.brand||p.brand, ProductCode:sm.partCode}, source:'match verificato · codice'};
      if(sm.icecatId) return {params:{IcecatProductId:sm.icecatId}, source:'match per nome'};
    }
    var brand=(p.brand && p.brand!=='Altro')?p.brand:'';
    var model=extractModel(p.title, p.brand);
    if(brand && model) return {params:{Brand:brand, ProductCode:model}, source:'auto da titolo'};
    return {params:null, source:'nessun identificatore'};
  }

  // bottone occhio: mostrato solo dove c'è una scheda Icecat agganciata
  function eyeBtn(p){ return hasIcecat(p) ? '<button class="eye-btn" title="Scheda tecnica" onclick="openIcecat(\''+p.id+'\')"><i class="fas fa-eye"></i></button>' : ''; }

  var iceCur=null;
  function openIcecat(id){ var p=findP(id); if(!p) return; iceCur=p; document.getElementById('iceBack').classList.add('open'); renderIcecat(p); }
  function closeIcecat(){ document.getElementById('iceBack').classList.remove('open'); iceCur=null; }

  function renderIcecat(p){
    var q=icecatQuery(p), box=document.getElementById('iceBox');
    var head='<div class="ice-head"><div><div class="t">'+esc(p.title)+'</div><div class="s">SKU '+esc(p.id)+' · match: '+esc(q.source)+'</div></div><button onclick="closeIcecat()">✕</button></div>';
    var rm=remoteOverride(p.id), m=iceMap()[p.id], ovrVal=rm?rm.value:(m?(m.gtin||m.icecatId||m.partCode||''):'');
    var ovr='<div class="ice-ovr"><div class="row1"><label>EAN o codice:</label>'
      +'<input id="iceOvr" value="'+esc(ovrVal)+'" placeholder="es. 5397184999999 oppure Latitude 7420">'
      +'<button onclick="iceSaveOverride()">Salva e riprova</button>'
      +(m?'<button class="ghost" onclick="iceClearOverride()">Rimuovi</button>':'')
      +'</div><div class="hint">Se la scheda non compare, incolla l\'EAN (numerico) o il codice prodotto del produttore: il match resta salvato per questo prodotto.</div></div>';
    var attr='<div class="ice-attr">Schede tecniche fornite da <a href="https://icecat.biz" target="_blank" rel="noopener">Icecat</a> · contenuto "as is"</div>';

    if(!ICECAT.shopname){
      box.innerHTML=head+'<div class="ice-body"><div class="ice-state"><i class="fas fa-triangle-exclamation"></i>Shopname Icecat non configurato.<br>Imposta <b>ICECAT_SHOPNAME</b> nel backend (o <code>localStorage.'+ICE_SHOP_KEY+'</code> per test).</div></div>'+ovr;
      return;
    }
    if(!q.params){
      box.innerHTML=head+'<div class="ice-body"><div class="ice-state"><i class="fas fa-magnifying-glass"></i>Nessun identificatore per cercare questo prodotto.<br>Inserisci un EAN o codice qui sotto.</div></div>'+ovr+attr;
      return;
    }
    box.innerHTML=head+'<div class="ice-body"><div id="iceDatasheet"><div class="ice-state"><i class="fas fa-spinner fa-spin"></i>Caricamento scheda Icecat…</div></div></div>'+ovr+attr;
    ensureIcecatJs(function(err){
      var tgt=document.getElementById('iceDatasheet'); if(!tgt) return;
      if(err){ tgt.innerHTML='<div class="ice-state"><i class="fas fa-plug-circle-xmark"></i>Widget Icecat non raggiungibile.</div>'; return; }
      var params={}; for(var k in q.params) params[k]=q.params[k]; params.UserName=ICECAT.shopname;
      try{ IcecatLive.getDatasheet('#iceDatasheet', params, (ICECAT.lang||'IT').toLowerCase()); }
      catch(e){ tgt.innerHTML='<div class="ice-state"><i class="fas fa-circle-xmark"></i>Errore nel caricamento della scheda.</div>'; }
    });
  }

  function iceSaveOverride(){
    if(!iceCur) return;
    var v=(document.getElementById('iceOvr').value||'').trim(), m=iceMap();
    if(!v) delete m[iceCur.id];
    else if(/^[0-9]{8,14}$/.test(v)) m[iceCur.id]={gtin:v};
    else m[iceCur.id]={partCode:v, brand:iceCur.brand};
    iceSaveMap(m); renderIcecat(iceCur);
  }
  function iceClearOverride(){ if(!iceCur) return; var m=iceMap(); delete m[iceCur.id]; iceSaveMap(m); renderIcecat(iceCur); }

  /* ── UI CONTROLS ── */
  function onSearch(v){ state.search=v.trim(); render(); }
  function setSort(v){ state.sort=v; render(); }
  function setView(v){ state.view=v;
    document.getElementById('vGrid').classList.toggle('active',v==='grid');
    document.getElementById('vList').classList.toggle('active',v==='list');
    render();
  }
  function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); }
  function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); }

  /* ── INIT ── */
  loadIcecatConfig();
  buildSidebar(); setView('list'); updateCart(); render();
</script>
</body>
</html>
