# Deploy PrimoIT su Dokploy (tipo: Compose)
# Persistenza DB SQLite: bind mount su ../files/ — la cartella "files" è il volume
# persistente che Dokploy tiene separato dal codice e NON ricrea a ogni deploy
# (il named volume invece veniva rigenerato, perdendo i deal).
services:
  primoit:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"          # Dokploy instrada il dominio su questa porta
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      DB_PATH: /app/data/primoit.db
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:?imposta ADMIN_PASS nelle env di Dokploy}
      # Stripe (opzionali: senza chiavi i link non vengono generati, il resto funziona)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_VAT_RATE_ID: ${STRIPE_VAT_RATE_ID:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    volumes:
      - ../files/data:/app/data   # ← bind mount persistente Dokploy (DB SQLite)
