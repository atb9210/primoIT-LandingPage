# Deploy PrimoIT su Dokploy (tipo: Compose)
# Persistenza DB SQLite: NAMED VOLUME gestito da Docker (primoit_data).
# I named volume sopravvivono ai redeploy (docker compose up --build li riusa).
# Prima i dati sparivano perché il Dockerfile aveva `VOLUME /app/data` (volume
# ANONIMO, ricreato a ogni deploy) che mascherava il mount: ora è stato rimosso.
# Il bind mount relativo ../files/data non era affidabile su Dokploy (path che
# cambia a ogni clone del repo).
services:
  primoit:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"          # Dokploy instrada il dominio su questa porta
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      DB_PATH: /app/data/primoit.db
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:?imposta ADMIN_PASS nelle env di Dokploy}
      # Stripe (opzionali: senza chiavi i link non vengono generati, il resto funziona)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_VAT_RATE_ID: ${STRIPE_VAT_RATE_ID:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      # Icecat Live (arricchimento schede shop)
      ICECAT_SHOPNAME: ${ICECAT_SHOPNAME:-}
      ICECAT_LANG: ${ICECAT_LANG:-IT}
    volumes:
      - primoit_data:/app/data   # named volume persistente (DB SQLite)

volumes:
  primoit_data:
    name: primoit_data
